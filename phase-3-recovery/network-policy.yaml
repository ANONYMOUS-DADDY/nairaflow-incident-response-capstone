# Kubernetes Network Segmentation Policy

## Objective

Prevent lateral movement between workloads in staging and production environments.

---

```yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: payment-service-isolation
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: payment-gateway

  policyTypes:
  - Egress
  - Ingress

  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api-gateway

  egress:
  - to:
    - podSelector:
        matchLabels:
          app: rds-proxy
    ports:
    - protocol: TCP
      port: 5432
```

---

## Security Logic

* Blocks all unauthorized pod-to-pod communication
* Enforces micro-segmentation
* Limits database access strictly to proxy layer
* Prevents staging → production lateral movement

---

## Outcome

✔ Zero trust Kubernetes model enforced
✔ Lateral movement eliminated
✔ PCI-DSS segmentation requirement satisfied
